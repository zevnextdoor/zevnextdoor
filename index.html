<script>
const output = document.getElementById("output");

const intro = [
"$ curl -X GET https://zevnextdoor.github.io",
"> connecting...",
"> /// Access Granted ///"
];

const sections = [
[
"$ about.me",
"> user      : zevnextdoor",
"> alias     : zev",
"> bio       : cheat developer & roblox ugc creator",
"> description   : contributed to 10M+ robux in sales"
],
[
"$ Languages",
"  ├ python",
"  ├ javascript",
"  ├ html",
"  ├ lua",
"  └ c++"
],
[
"$ Interests",
"  ├ automation",
"  ├ web development",
"  ├ cheat development",
"  ├ gaming",
"  └ music"
],
[
"$ echo \Thanks for visiting! <3\"
]
];

let speed = 20;

function typeLine(text, parent, callback) {
  let i = 0;
  const div = document.createElement("div");
  div.className = "line";
  parent.appendChild(div);

  function typing() {
    if (i < text.length) {
      div.textContent += text[i];
      i++;
      setTimeout(typing, speed);
    } else {
      callback && callback();
    }
  }

  typing();
}

function addSpacing() {
  const space = document.createElement("div");
  space.style.height = "14px";
  output.appendChild(space);
}

function typeSection(section, callback) {
  const sectionDiv = document.createElement("div");
  output.appendChild(sectionDiv);

  let i = 0;

  function nextLine() {
    if (i < section.length) {
      typeLine(section[i], sectionDiv, () => {
        i++;
        nextLine();
      });
    } else {
      addSpacing(); // 👈 safe spacing AFTER section finishes
      callback && callback();
    }
  }

  nextLine();
}

function typeAll(index = 0, callback) {
  if (index < sections.length) {
    typeSection(sections[index], () => {
      setTimeout(() => typeAll(index + 1, callback), 150);
    });
  } else {
    callback && callback();
  }
}

// run intro then main
function start() {
  let i = 0;

  function typeIntro() {
    if (i < intro.length) {
      const div = document.createElement("div");
      div.className = "line";
      output.appendChild(div);

      let j = 0;
      function typing() {
        if (j < intro[i].length) {
          div.textContent += intro[i][j];
          j++;
          setTimeout(typing, speed);
        } else {
          i++;
          typeIntro();
        }
      }

      typing();
    } else {
      setTimeout(() => {
        output.innerHTML = "";
        typeAll();
      }, 1000);
    }
  }

  typeIntro();
}

start();
</script>
